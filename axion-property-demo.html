    function docStyle(){return `<style>body{font-family:Arial,sans-serif;line-height:1.5;color:#111827;padding:42px;max-width:850px;margin:auto}.doc-brand{display:flex;justify-content:flex-end;margin:0 0 14px}.doc-brand img{width:118px;height:auto;opacity:.82}h1{text-align:center;font-size:20px;text-transform:uppercase}h2{font-size:14px;margin-top:20px;text-transform:uppercase}p{text-align:justify}table{width:100%;border-collapse:collapse;margin:18px 0}td{border:1px solid #94a3b8;padding:10px;vertical-align:top}.sign{display:grid;grid-template-columns:1fr 1fr;gap:70px;margin-top:70px}.line{border-top:1px solid #111;text-align:center;padding-top:8px}@media print{.doc-brand{margin-bottom:10px}.doc-brand img{width:104px}}</style>`}
    function contractHtml(data){const title=data.type==="comercial"?"CONTRATO DE LOCAÇÃO PARA FINS COMERCIAIS":"CONTRATO DE LOCAÇÃO RESIDENCIAL";const destination=data.type==="comercial"?"exercício de atividade empresarial indicada pelo LOCATÁRIO":"moradia do LOCATÁRIO e de sua família";const commercial=data.type==="comercial";return `<!doctype html><html><head><meta charset="utf-8"><title>${title}</title>${docStyle()}</head><body><h1>${title}</h1><p>As partes abaixo qualificadas celebram o presente contrato de locação, que se regerá pela Lei nº 8.245/1991, pelo Código Civil Brasileiro e pelas cláusulas e condições a seguir estipuladas.</p><h2>I - Qualificação das partes</h2><p><strong>LOCADOR:</strong> ${landlordData[entity[0]]}.</p><p><strong>LOCATÁRIO:</strong> ${data.tenantName}, inscrito(a) no CPF/CNPJ nº ${data.tenantDoc}${data.tenantJob?", "+data.tenantJob:""}${data.tenantAddress?", residente/estabelecido(a) em "+data.tenantAddress:""}, doravante denominado(a) simplesmente LOCATÁRIO.</p><h2>Cláusula primeira - Do objeto da locação</h2><p>O LOCADOR cede ao LOCATÁRIO, a título de locação ${commercial?"para fins comerciais":"para fins estritamente residenciais"}, o imóvel ${data.property[2]}, situado em ${data.property[5]}, ${data.property[6]}.</p><p>O imóvel destina-se exclusivamente à ${destination}, sendo vedada a alteração de destinação, cessão, empréstimo ou sublocação sem autorização prévia e escrita do LOCADOR.</p><h2>Cláusula segunda - Do prazo</h2><p>A locação é ajustada pelo prazo de ${data.months} meses, com início em ${fmtDate(data.start)} e término previsto para ${fmtDate(data.end)}. Findo o prazo sem oposição das partes, o contrato poderá prorrogar-se por prazo indeterminado nos termos da Lei do Inquilinato.</p><h2>Cláusula terceira - Do aluguel e reajuste</h2><p>O aluguel mensal é fixado em ${money(data.value)}, a ser pago até o dia ${data.dueDay} de cada mês. O aluguel será reajustado anualmente na data de aniversário do contrato, pelo índice ${data.index}, com próxima data de reajuste em ${fmtDate(data.adjustment)}.</p><p>O atraso sujeitará o LOCATÁRIO à multa moratória de 10%, juros de mora de 1% ao mês pro rata die e correção monetária pelo índice eleito neste contrato.</p><h2>Cláusula quarta - Dos encargos da locação</h2><p>Além do aluguel, serão de responsabilidade do LOCATÁRIO os encargos pactuados, incluindo condomínio ordinário, consumo de água, energia, gás, telefone, internet, taxas individualizadas e demais despesas vinculadas ao uso do imóvel. IPTU e despesas extraordinárias seguirão o ajuste registrado entre as partes.</p><h2>Cláusula quinta - Das benfeitorias e obras</h2><p>Benfeitorias úteis, voluptuárias, reformas, ampliações ou alterações estruturais dependerão de autorização prévia e escrita do LOCADOR. Despesas realizadas sem autorização não serão compensadas com aluguéis, salvo aditivo escrito.</p><h2>Cláusula sexta - Da vistoria do imóvel</h2><p>O imóvel é entregue conforme laudo de vistoria de entrega, que integrará o contrato como anexo. Na devolução, nova vistoria comparativa será realizada, devendo o LOCATÁRIO restituir o imóvel nas condições em que recebeu, ressalvado o desgaste natural.</p><h2>Cláusula sétima - Da garantia locatícia</h2><p>As partes elegem como modalidade de garantia: ${data.guarantee}. É vedada a cumulação de garantias, nos termos do art. 37, parágrafo único, da Lei nº 8.245/1991.</p><h2>Cláusula oitava - Da rescisão e multa contratual</h2><p>A rescisão antecipada pelo LOCATÁRIO sujeitará ao pagamento de multa proporcional ao prazo remanescente, observada a Lei do Inquilinato. Constituem causas de rescisão imediata falta de pagamento, alteração de destinação, obras não autorizadas, sublocação sem autorização e descumprimento contratual.</p>${commercial?`<h2>Cláusula nona - Das licenças e atividade comercial</h2><p>O LOCATÁRIO será responsável por alvarás, licenças sanitárias, ambientais, inscrições, autorizações públicas e adequações necessárias ao exercício de sua atividade, não podendo alterar a finalidade comercial sem anuência do LOCADOR.</p>`:`<h2>Cláusula nona - Dos animais e uso residencial</h2><p>A permanência de animais e o uso das áreas comuns observarão as normas condominiais, quando aplicáveis, respondendo o LOCATÁRIO por danos causados ao imóvel, a terceiros ou ao condomínio.</p>`}<h2>Cláusula décima - Disposições gerais</h2><p>${data.notes||"Aplicam-se a Lei nº 8.245/1991, o Código Civil e o foro da comarca do imóvel."}</p><div class="sign"><div class="line">LOCADOR</div><div class="line">LOCATÁRIO</div></div><div class="sign"><div class="line">1ª Testemunha</div><div class="line">2ª Testemunha</div></div></body></html>`}
    function contractHtmlFromNewModel(data){const commercial=data.type==="comercial";const title=commercial?"CONTRATO DE LOCAÇÃO PARA FINS COMERCIAIS":"CONTRATO DE LOCAÇÃO RESIDENCIAL";const destination=commercial?"exercício da atividade comercial informada pelo LOCATÁRIO":"moradia do LOCATÁRIO e de sua família";const clauses=commercial?commercialModelClauses(data):residentialModelClauses(data);return `<!doctype html><html><head><meta charset="utf-8"><title>${title}</title>${docStyle()}</head><body>${docBrand()}<h1>${title}</h1><p><strong>${commercial?"Lei nº 8.245/1991 (Lei do Inquilinato) - Locação Não Residencial":"Lei nº 8.245/1991 (Lei do Inquilinato) - Locação Residencial"}</strong></p><p>As partes abaixo qualificadas celebram o presente Contrato de Locação, que se regerá pela Lei nº 8.245/1991, pelo Código Civil Brasileiro e pelas cláusulas e condições a seguir estipuladas.</p><h2>I - Qualificação das partes</h2><p><strong>LOCADOR:</strong> ${landlordData[entity[0]]}.</p><p><strong>LOCATÁRIO:</strong> ${data.tenantName}, inscrito(a) no CPF/CNPJ nº ${data.tenantDoc}${data.tenantJob?", "+data.tenantJob:""}${data.tenantAddress?", residente/estabelecido(a) em "+data.tenantAddress:""}, doravante denominado(a) simplesmente LOCATÁRIO.</p><h2>Cláusula primeira - Do objeto da locação</h2><p>O LOCADOR cede ao LOCATÁRIO, a título de locação ${commercial?"para fins comerciais":"para fins estritamente residenciais"}, o imóvel ${data.property[2]}, situado em ${data.property[5]}, ${data.property[6]}.</p><p>O imóvel será utilizado exclusivamente para ${destination}, sendo vedada alteração de destinação, cessão, empréstimo ou sublocação sem consentimento prévio e escrito do LOCADOR.</p>${clauses}<div class="sign"><div class="line">LOCADOR</div><div class="line">LOCATÁRIO</div></div><div class="sign"><div class="line">1ª Testemunha<br>Nome:<br>CPF:</div><div class="line">2ª Testemunha<br>Nome:<br>CPF:</div></div></body></html>`}
    function residentialModelClauses(data){return `<h2>Cláusula segunda - Do prazo</h2><p>A locação é ajustada pelo prazo de ${data.months} meses, com início em ${fmtDate(data.start)} e término previsto para ${fmtDate(data.end)}. Findo o prazo contratual sem oposição, o contrato poderá prorrogar-se por prazo indeterminado nos termos do art. 46 da Lei do Inquilinato.</p><h2>Cláusula terceira - Do aluguel e reajuste</h2><p>O aluguel mensal é fixado em ${money(data.value)}, a ser pago até o dia ${data.dueDay} de cada mês. O aluguel será reajustado anualmente, na data de aniversário do contrato, pelo índice ${data.index}, com próximo reajuste em ${fmtDate(data.adjustment)}.</p><p>O atraso sujeitará o LOCATÁRIO à multa moratória de 10%, juros de mora de 1% ao mês pro rata die e correção monetária pelo índice eleito.</p><h2>Cláusula quarta - Dos encargos da locação</h2><p>São de responsabilidade do LOCATÁRIO as taxas de condomínio ordinárias, consumo de energia elétrica, água, esgoto, gás, telefone, internet, multas condominiais decorrentes de sua conduta e demais despesas ordinárias de uso. IPTU, seguro e despesas extraordinárias seguirão o ajuste registrado entre as partes.</p><h2>Cláusula quinta - Das benfeitorias e obras</h2><p>Benfeitorias úteis e voluptuárias somente poderão ser realizadas mediante autorização prévia e escrita do LOCADOR. Ausente autorização, não serão indenizáveis e poderão ter retirada exigida ao fim da locação.</p><h2>Cláusula sexta - Da vistoria do imóvel</h2><p>O imóvel é entregue conforme Laudo de Vistoria de Entrega, parte integrante deste contrato. Na devolução, será feita vistoria comparativa, devendo o LOCATÁRIO restituir o imóvel nas condições recebidas, ressalvado o desgaste natural.</p><h2>Cláusula sétima - Da garantia locatícia</h2><p>As partes elegem a garantia: ${data.guarantee}. É vedada a cumulação de modalidades de garantia, conforme art. 37, parágrafo único, da Lei nº 8.245/1991.</p><h2>Cláusula oitava - Da sublocação, cessão e empréstimo</h2><p>É vedado ao LOCATÁRIO sublocar, ceder, transferir, emprestar ou utilizar o imóvel para hospedagem remunerada sem autorização prévia e escrita do LOCADOR.</p><h2>Cláusula nona - Dos animais de estimação</h2><p>A permanência de animais observará as normas condominiais aplicáveis, respondendo o LOCATÁRIO por danos, perturbação ao sossego, segurança ou saúde de vizinhos.</p><h2>Cláusula décima - Disposições gerais</h2><p>${data.notes||"Aplicam-se a Lei nº 8.245/1991, o Código Civil Brasileiro e o foro da comarca do imóvel."}</p>`}
    function commercialModelClauses(data){return `<h2>Cláusula segunda - Do prazo</h2><p>A locação é ajustada pelo prazo de ${data.months} meses, com início em ${fmtDate(data.start)} e término previsto para ${fmtDate(data.end)}. Findo o prazo, poderá prorrogar-se por prazo indeterminado, aplicando-se os arts. 56 e 57 da Lei nº 8.245/1991.</p><h2>Cláusula terceira - Do aluguel e reajuste</h2><p>O aluguel mensal é fixado em ${money(data.value)}, a ser pago até o dia ${data.dueDay} de cada mês. O aluguel será reajustado anualmente na data de aniversário do contrato, pelo índice ${data.index}, com próximo reajuste em ${fmtDate(data.adjustment)}.</p><p>O atraso sujeitará o LOCATÁRIO à multa moratória de 10%, juros de mora de 1% ao mês pro rata die e correção monetária pelo índice eleito.</p><h2>Cláusula quarta - Dos encargos da locação</h2><p>Além do aluguel, são de responsabilidade do LOCATÁRIO IPTU e tributos proporcionais, taxas condominiais, consumo de energia elétrica, água, gás, internet, seguros obrigatórios, alvarás, licenças e demais autorizações necessárias ao exercício da atividade comercial, salvo ajuste diverso.</p><h2>Cláusula quinta - Das benfeitorias e obras</h2><p>Qualquer obra, reforma ou modificação estrutural dependerá de autorização prévia do LOCADOR e aprovação dos órgãos públicos competentes quando exigível. Benfeitorias incorporadas ao imóvel não serão indenizadas salvo acordo escrito.</p><h2>Cláusula sexta - Da vistoria do imóvel</h2><p>As partes realizarão vistoria de entrega e vistoria de devolução. O LOCATÁRIO deverá devolver o imóvel no estado recebido, ressalvado o desgaste natural pelo uso adequado.</p><h2>Cláusula sétima - Da garantia locatícia</h2><p>As partes elegem a garantia: ${data.guarantee}. É vedada a cumulação de garantias, conforme art. 37, parágrafo único, da Lei nº 8.245/1991.</p><h2>Cláusula oitava - Da rescisão e multa contratual</h2><p>A rescisão antecipada sujeitará a parte responsável à multa proporcional ao prazo remanescente. Falta de pagamento, alteração de finalidade, obras não autorizadas, sublocação sem autorização e descumprimento contratual autorizam rescisão.</p><h2>Cláusula nona - Da atividade comercial</h2><p>O LOCATÁRIO será responsável por alvará de funcionamento, licenças sanitárias, ambientais e demais autorizações públicas necessárias à atividade exercida, não podendo alterar a destinação sem anuência do LOCADOR.</p><h2>Cláusula décima - Disposições gerais</h2><p>${data.notes||"Aplicam-se a Lei nº 8.245/1991, o Código Civil Brasileiro e o foro da comarca do imóvel."}</p>`}
    function downloadContract(data,format){const html=contractHtmlFromNewModel(data);if(format==="word"){const blob=new Blob(["\ufeff",html],{type:"application/msword"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`contrato-${data.property[2].replace(/[^a-z0-9]+/gi,"-").toLowerCase()}.doc`;a.click();URL.revokeObjectURL(a.href)}else{const w=window.open("","_blank");w.document.write(html);w.document.close();w.focus();setTimeout(()=>w.print(),300)}}
    function receiptHtml(payment,receiptDate){const property=props.find(p=>p[0]===payment[3]), contract=contracts.find(c=>c[0]===payment[2]), tenant=people.find(p=>p[0]===contract?.[4])||["","","","Locatário","", ""];const total=payment[6];const landlordDoc=entity[3], paymentDate=receiptDateLabel(receiptDate);return `<!doctype html><html><head><meta charset="utf-8"><title>Recibo de Pagamento de Aluguel</title>${docStyle()}</head><body>${docBrand()}<h1>Recibo de Pagamento de Aluguel</h1><p style="text-align:center"><strong>Referente à Locação Imobiliária</strong></p><p>Recebi de <strong>${tenant[3]}</strong>, portador(a)/inscrito(a) no CPF/CNPJ nº <strong>${tenant[5]||"não informado"}</strong>, a importância de <strong>${money(total)}</strong>, referente ao pagamento do aluguel do imóvel situado em <strong>${property?.[5]||""}, ${property?.[6]||""}</strong>, correspondente à competência de <strong>${payment[4]}</strong>.</p><table><tr><td>Valor do Aluguel: ${money((contract&&contract[8])||total)}</td><td>Encargos (condomínio/IPTU): conforme parcela</td></tr><tr><td>Multa/Juros (se houver): R$ 0,00</td><td>Valor Total Recebido: ${money(total)}</td></tr><tr><td>Forma de Pagamento: PIX / Transferência / Boleto / Dinheiro</td><td>Data do Pagamento: ${paymentDate}</td></tr></table><p>Para maior clareza, firmo o presente recibo, dando plena, geral e irrevogável quitação do valor acima referido, nada mais havendo a reclamar a este título e nesta competência.</p><p>${property?.[6]||"Município/UF"}, ${paymentDate}.</p><div class="sign"><div class="line">${entity[2]}<br>CPF/CNPJ: ${landlordDoc}<br>LOCADOR(A)</div><div></div></div></body></html>`}
    function downloadReceipt(id,format){const payment=rents.find(r=>r[0]===id);if(!payment)return;const today=new Date().toLocaleDateString("pt-BR");const receiptDate=prompt("Informe a data que deve constar no recibo (DD/MM/AAAA):",today);if(!receiptDate)return;const html=receiptHtml(payment,receiptDate);if(format==="word"){const blob=new Blob(["\ufeff",html],{type:"application/msword"});const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`recibo-${payment[4].replace("/","-")}.doc`;a.click();URL.revokeObjectURL(a.href)}else{const w=window.open("","_blank");w.document.write(html);w.document.close();w.focus();setTimeout(()=>w.print(),300)}}
    function viewEl(html){viewElNode.innerHTML=html}
    init();
  </script>
